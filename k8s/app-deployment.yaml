apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudstream-app
  namespace: cloudstream
  labels:
    app: cloudstream-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cloudstream-app
  template:
    metadata:
      labels:
        app: cloudstream-app
    spec:
      containers:
      - name: app
        image: cloudstream/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: cloudstream-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: cloudstream-secrets
              key: redis-url
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: cloudstream-app
  namespace: cloudstream
spec:
  type: ClusterIP
  selector:
    app: cloudstream-app
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
