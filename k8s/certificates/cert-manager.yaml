apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cloudstream.local
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@cloudstream.local
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudstream-tls-cert
  namespace: cloudstream
spec:
  secretName: cloudstream-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: cloudstream.local
  dnsNames:
  - cloudstream.local
  - "*.cloudstream.local"
  duration: 2160h
  renewBefore: 720h

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudstream-ingress
  namespace: cloudstream
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - cloudstream.local
    - "*.cloudstream.local"
    secretName: cloudstream-tls-secret
  rules:
  - host: cloudstream.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloudstream-app
            port:
              number: 80
  - host: encoding.cloudstream.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloudstream-encoding
            port:
              number: 80
