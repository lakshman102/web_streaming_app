apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudstream-app
  namespace: cloudstream
  labels:
    app: cloudstream-app

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudstream-encoding
  namespace: cloudstream
  labels:
    app: cloudstream-encoding

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudstream-app-role
  namespace: cloudstream
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudstream-encoding-role
  namespace: cloudstream
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudstream-app-rolebinding
  namespace: cloudstream
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudstream-app-role
subjects:
- kind: ServiceAccount
  name: cloudstream-app
  namespace: cloudstream

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudstream-encoding-rolebinding
  namespace: cloudstream
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudstream-encoding-role
subjects:
- kind: ServiceAccount
  name: cloudstream-encoding
  namespace: cloudstream

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloudstream-app-pdb
  namespace: cloudstream
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cloudstream-app

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloudstream-encoding-pdb
  namespace: cloudstream
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cloudstream-encoding
