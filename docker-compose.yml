version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/cloudstream
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
      - encoding
    networks:
      - cloudstream
    restart: unless-stopped

  encoding:
    build:
      context: .
      dockerfile: docker/Dockerfile.encoding
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/cloudstream
    depends_on:
      - mongo
    networks:
      - cloudstream
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    networks:
      - cloudstream
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cloudstream
    restart: unless-stopped
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - cloudstream
    restart: unless-stopped

networks:
  cloudstream:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
