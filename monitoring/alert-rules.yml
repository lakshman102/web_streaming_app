groups:
  - name: cloudstream
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected on {{ $labels.pod_name }}"
          description: "CPU usage is above 70% for 5 minutes"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected on {{ $labels.pod_name }}"
          description: "Memory usage is above 80% of limit"

      - alert: PodRestartingTooOften
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod_name }} is restarting frequently"

      - alert: EncodingServiceDown
        expr: up{job="cloudstream-encoding"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Encoding service is down"

      - alert: AppServiceDown
        expr: up{job="cloudstream-app"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App service is down"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected (>5%)"

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response times detected (p95 > 1s)"

      - alert: MongoDBConnectionPoolExhausted
        expr: mongodb_connections_current{type="available"} < 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB connection pool nearly exhausted"

      - alert: RedisMemoryUsageHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is above 90%"
