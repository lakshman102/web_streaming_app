global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: cloudstream-monitor

scrape_configs:
  - job_name: cloudstream-app
    static_configs:
      - targets: [localhost:3000]
    metrics_path: /api/metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: cloudstream-encoding
    static_configs:
      - targets: [localhost:3001]
    metrics_path: /api/encoding/metrics
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - cloudstream
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - /etc/prometheus/rules.yml
